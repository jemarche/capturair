<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG Tiny PS//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11-tiny-ps.dtd">
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.1"
     baseProfile="tiny-ps"
     id="Layer_1"
     x="0px"
     y="0px"
     viewBox="0 0 512 512"
     xml:space="preserve"
     width="512"
     height="512">
  <title>CapturAir</title>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4BAEE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6FBF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Circle behind drone — upper half -->
  <circle cx="256" cy="200" r="168" fill="#FFFFFF" fill-opacity="0.18"/>

  <!-- WIFI ARCS -->
  <path d="M224,108 Q256,90 288,108" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <path d="M210,95 Q256,72 302,95" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-opacity="0.75"/>
  <path d="M196,82 Q256,55 316,82" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- DRONE ARMS -->
  <line x1="232" y1="168" x2="158" y2="116" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
  <line x1="280" y1="168" x2="354" y2="116" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
  <line x1="232" y1="192" x2="158" y2="244" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
  <line x1="280" y1="192" x2="354" y2="244" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>

  <!-- PROPELLERS top-left -->
  <circle cx="158" cy="116" r="10" fill="#FFFFFF" fill-opacity="0.9"/>
  <ellipse cx="158" cy="116" rx="40" ry="8" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(-25 158 116)"/>
  <ellipse cx="158" cy="116" rx="40" ry="8" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(65 158 116)"/>

  <!-- PROPELLERS top-right -->
  <circle cx="354" cy="116" r="10" fill="#FFFFFF" fill-opacity="0.9"/>
  <ellipse cx="354" cy="116" rx="40" ry="8" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(25 354 116)"/>
  <ellipse cx="354" cy="116" rx="40" ry="8" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(-65 354 116)"/>

  <!-- PROPELLERS bottom-left -->
  <circle cx="158" cy="244" r="10" fill="#FFFFFF" fill-opacity="0.9"/>
  <ellipse cx="158" cy="244" rx="40" ry="8" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(25 158 244)"/>
  <ellipse cx="158" cy="244" rx="40" ry="8" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(-65 158 244)"/>

  <!-- PROPELLERS bottom-right -->
  <circle cx="354" cy="244" r="10" fill="#FFFFFF" fill-opacity="0.9"/>
  <ellipse cx="354" cy="244" rx="40" ry="8" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(-25 354 244)"/>
  <ellipse cx="354" cy="244" rx="40" ry="8" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(65 354 244)"/>

  <!-- DRONE BODY platform -->
  <ellipse cx="256" cy="186" rx="48" ry="14" fill="#FFFFFF" fill-opacity="0.95"/>
  <!-- DRONE BODY top dome -->
  <ellipse cx="256" cy="172" rx="30" ry="18" fill="#FFFFFF" fill-opacity="0.95"/>
  <!-- Camera lens -->
  <circle cx="256" cy="172" r="10" fill="#3A7FC1"/>
  <circle cx="256" cy="172" r="6" fill="#1A5A9A"/>
  <circle cx="257" cy="171" r="2.5" fill="#FFFFFF" fill-opacity="0.6"/>

