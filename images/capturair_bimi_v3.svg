<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG Tiny PS//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11-tiny-ps.dtd">
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.1"
     baseProfile="tiny-ps"
     id="Layer_1"
     x="0px"
     y="0px"
     viewBox="0 0 512 512"
     xml:space="preserve"
     width="512"
     height="512">
  <title>CapturAir</title>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4BAEE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6FBF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Circle behind drone — centered at y=185 -->
  <circle cx="256" cy="185" r="148" fill="#FFFFFF" fill-opacity="0.18"/>

  <!-- WIFI ARCS — above drone body at y~118 -->
  <path d="M230,118 Q256,100 282,118" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <path d="M218,106 Q256,84 294,106" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-opacity="0.75"/>
  <path d="M206,94 Q256,68 306,94" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- DRONE ARMS -->
  <line x1="234" y1="168" x2="168" y2="118" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="278" y1="168" x2="344" y2="118" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="234" y1="188" x2="168" y2="232" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="278" y1="188" x2="344" y2="232" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>

  <!-- PROPELLERS top-left -->
  <circle cx="168" cy="118" r="9" fill="#FFFFFF" fill-opacity="0.9"/>
  <ellipse cx="168" cy="118" rx="36" ry="7" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(-30 168 118)"/>
  <ellipse cx="168" cy="118" rx="36" ry="7" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(60 168 118)"/>

  <!-- PROPELLERS top-right -->
  <circle cx="344" cy="118" r="9" fill="#FFFFFF" fill-opacity="0.9"/>
  <ellipse cx="344" cy="118" rx="36" ry="7" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(30 344 118)"/>
  <ellipse cx="344" cy="118" rx="36" ry="7" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(-60 344 118)"/>

  <!-- PROPELLERS bottom-left -->
  <circle cx="168" cy="232" r="9" fill="#FFFFFF" fill-opacity="0.9"/>
  <ellipse cx="168" cy="232" rx="36" ry="7" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(30 168 232)"/>
  <ellipse cx="168" cy="232" rx="36" ry="7" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(-60 168 232)"/>

  <!-- PROPELLERS bottom-right -->
  <circle cx="344" cy="232" r="9" fill="#FFFFFF" fill-opacity="0.9"/>
  <ellipse cx="344" cy="232" rx="36" ry="7" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(-30 344 232)"/>
  <ellipse cx="344" cy="232" rx="36" ry="7" fill="#FFFFFF" fill-opacity="0.85" transform="rotate(60 344 232)"/>

  <!-- DRONE BODY -->
  <ellipse cx="256" cy="182" rx="44" ry="13" fill="#FFFFFF" fill-opacity="0.95"/>
  <ellipse cx="256" cy="170" rx="28" ry="17" fill="#FFFFFF" fill-opacity="0.95"/>
  <!-- Camera -->
  <circle cx="256" cy="170" r="9" fill="#3A7FC1"/>
  <circle cx="256" cy="170" r="5" fill="#1A5A9A"/>
  <circle cx="256" cy="170" r="2" fill="#FFFFFF" fill-opacity="0.6"/>

  <!-- LANDING GEAR -->
  <line x1="232" y1="193" x2="216" y2="210" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <line x1="280" y1="193" x2="296" y2="210" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <line x1="206" y1="210" x2="230" y2="210" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <line x1="282" y1="210" x2="306" y2="210" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>

  <!-- TEXT: "Captur" -->
  <text x="256" y="322"
        font-family="Arial, Helvetica, sans-serif"
        font-size="80"
        font-weight="bold"
        fill="#FFFFFF"
        text-anchor="middle">Captur</text>

  <!-- TEXT: "Air" -->
  <text x="256" y="396"
        font-family="Arial, Helvetica, sans-serif"
        font-size="74"
        font-weight="normal"
        fill="#B8D8F0"
        text-anchor="middle">Air</text>

  <!-- TEXT: subtitle -->
  <text x="256" y="448"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="normal"
        fill="#FFFFFF"
        fill-opacity="0.65"
        text-anchor="middle"
        letter-spacing="3">DRONE · PHOTO AERIENNE</text>

</svg>
